const TIER_COLORS = { "S+": "#dc2626", "S": "#2563eb", "A": "#6b7280", "—": "#4b5563" };
const SK = "cutkeep-v3";
const DEFAULT_STATE = { week: 1, logs: {} };

function useAppState() {
  const [state, setState] = useState(DEFAULT_STATE);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    let mounted = true;
    async function init() {
      try {
        if (window.storage) {
          const result = await window.storage.get(SK);
          if (mounted && result && result.value) {
            setState(JSON.parse(result.value));
          }
        }
      } catch (e) {
        console.log("Storage load failed, using defaults:", e);
      }
      if (mounted) setReady(true);
    }
    init();
    return () => { mounted = false; };
  }, []);

  const save = useCallback(async (newState) => {
    setState(newState);
    try {
      if (window.storage) {
        await window.storage.set(SK, JSON.stringify(newState));
      }
    } catch (e) {
      console.log("Storage save failed:", e);
    }
  }, []);

  return { state, save, ready };
}

  useEffect(() => {

  const setLog = (w, d, e, s, v) => {
    const newLogs = Object.assign({}, state.logs || {});
    newLogs[logKey(w, d, e, s)] = v;
    save(Object.assign({}, state, { logs: newLogs }));
  };

  const setWeek = (w) => save(Object.assign({}, state, { week: w }));

  const getPrevAvg = (w, d, e) => {
    if (w <= 1) return null;
    var pw = w - 1;
    if (getBlock(pw) !== getBlock(w)) return null;
    var vals = [];
    for (var i = 0; i < 4; i++) {
      var v = (state.logs || {})[logKey(pw, d, e, i)];
      if (v && !isNaN(parseFloat(v))) vals.push(parseFloat(v));
    }
    if (vals.length === 0) return null;
    var sum = 0;
    for (var j = 0; j < vals.length; j++) sum += vals[j];
    return Math.round(sum / vals.length * 10) / 10;
  };

    if (w <= 1 || getBlock(w - 1) !== getBlock(w)) return [];
    var result = [];
    for (var i = 0; i < 4; i++) {
      result.push((state.logs || {})[logKey(w - 1, d, e, i)] || "");

      {/* Exercises */}
      {dayData && (
        <div style={{ padding: "6px 10px" }}>
          <div style={{ fontSize: 11, color: "#3d5c3d", marginBottom: 8, fontStyle: "italic", paddingLeft: 2 }}>{dayData.subtitle}</div>

          {dayData.exercises.map(function(ex, idx) {
            var isOpen = openEx === idx;
            var prevAvg = getPrevAvg(week, activeDay, idx);
            var prevSets = getPrevSets(week, activeDay, idx);
            var hasPrev = prevSets.some(function(v) { return v; });

            var currentLogs = [];
            for (var ci = 0; ci < ex.sets; ci++) {
              currentLogs.push(getLog(week, activeDay, idx, ci));
            }
            var hasLogs = currentLogs.some(function(v) { return v; });

            return (
              <div key={idx} style={{ background: "#0a100a", borderRadius: 8, marginBottom: 5, border: isOpen ? "1px solid #143d24" : "1px solid #111a11" }}>
                {/* Header */}
                <button onClick={function() { setOpenEx(isOpen ? null : idx); }} style={{
                  width: "100%", border: "none", background: "none", padding: "10px 11px", cursor: "pointer",
                  display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left",
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 9, color: "#2d4d2d", fontWeight: 700, minWidth: 12 }}>{idx + 1}</span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#d4e4d4" }}>{ex.name}</span>
                      <span style={{ background: TIER_COLORS[ex.tier] || "#4b5563", color: "#fff", padding: "1px 5px", borderRadius: 3, fontSize: 7, fontWeight: 700 }}>{ex.tier}</span>
                      {hasLogs && <span style={{ width: 5, height: 5, borderRadius: 3, background: "#22c55e", display: "inline-block" }} />}
                    </div>
                    <div style={{ fontSize: 9, color: "#3d5c3d", marginTop: 2 }}>
                      {ex.sets + "×" + ex.reps + " · " + ex.rest + " · Last: " + ex.lastRpe}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, flexShrink: 0 }}>
                    {prevAvg !== null && (
                      <div style={{ textAlign: "right", marginRight: 2 }}>
                        <div style={{ fontSize: 7, color: "#2d4d2d", fontWeight: 600 }}>PREV</div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#22c55e" }}>{prevAvg}</div>
                      </div>
                    )}
                    <span style={{ color: "#2d4d2d", fontSize: 12, transform: isOpen ? "rotate(180deg)" : "none", transition: "0.15s ease" }}>▾</span>
                  </div>
                </button>

                {/* Expanded */}
                {isOpen && (
                  <div style={{ padding: "0 11px 11px", borderTop: "1px solid #111a11" }}>
                    <div style={{ fontSize: 10, color: "#6a8a6a", padding: "7px 0 5px", lineHeight: 1.5 }}>{ex.notes}</div>

                    <div style={{ display: "flex", gap: 10, marginBottom: 8, fontSize: 9 }}>
                      <span style={{ color: "#3d5c3d" }}>Early: <b style={{ color: "#a3c4a3" }}>{ex.earlyRpe}</b></span>
                      <span style={{ color: "#3d5c3d" }}>Last: <b style={{ color: "#dc2626" }}>{ex.lastRpe}</b></span>
                      <span style={{ color: "#3d5c3d" }}>Rest: <b style={{ color: "#a3c4a3" }}>{ex.rest}</b></span>
                    </div>

                    {/* Previous week */}
                    {hasPrev && (
                      <div style={{ background: "#060906", borderRadius: 5, padding: "5px 8px", marginBottom: 7 }}>
                        <div style={{ fontSize: 7, color: "#2d4d2d", fontWeight: 700, marginBottom: 2 }}>LAST WEEK</div>
                        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                          {prevSets.map(function(v, si) {
                            if (!v) return null;
                            return <span key={si} style={{ fontSize: 10, color: "#22c55e", fontWeight: 600 }}>{"S" + (si + 1) + ": " + v}</span>;
                          })}
                          {prevAvg !== null && <span style={{ fontSize: 10, color: "#3d5c3d", marginLeft: "auto" }}>{"avg " + prevAvg}</span>}
                        </div>
                      </div>
                    )}

                    {/* Set inputs */}
                    <div style={{ display: "flex", gap: 5 }}>
                      {currentLogs.map(function(val, si) {
                        return (
                          <div key={si} style={{ flex: 1 }}>
                            <div style={{ fontSize: 7, color: "#2d4d2d", textAlign: "center", marginBottom: 2, fontWeight: 700 }}>{"SET " + (si + 1)}</div>
                            <input
                              type="text"
                              inputMode="decimal"
                              placeholder="—"
                              value={val}
                              onChange={function(e) { setLog(week, activeDay, idx, si, e.target.value); }}
                              style={{
                                width: "100%", padding: "9px 3px", border: "2px solid #152215", borderRadius: 6,
                                background: "#060906", color: "#e0f0e0", fontSize: 17, fontWeight: 700,
                                textAlign: "center", outline: "none", boxSizing: "border-box",
                              }}
                              onFocus={function(e) { e.target.style.borderColor = "#22c55e"; }}
                              onBlur={function(e) { e.target.style.borderColor = "#152215"; }}
                            />
                          </div>
                        );
                      })}
                    </div>

                    {/* Subs */}
                    <div style={{ marginTop: 8, paddingTop: 6, borderTop: "1px solid #111a11" }}>
                      <div style={{ fontSize: 7, color: "#2d4d2d", fontWeight: 700, marginBottom: 2, letterSpacing: 0.5 }}>IF BUSY</div>
                      <div style={{ fontSize: 9, color: "#4a6a4a", lineHeight: 1.6 }}>
                        <span style={{ color: "#2563eb", fontWeight: 700 }}>1.</span> {ex.sub1}
                        <br />
                        <span style={{ color: "#2563eb", fontWeight: 700 }}>2.</span> {ex.sub2}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Bottom bar */}
      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0, background: "#060906",
        borderTop: "1px solid #111a11", padding: "7px 0 22px",
        display: "flex", justifyContent: "center", maxWidth: 430, margin: "0 auto",
      }}>
        <div style={{ display: "flex", gap: 36 }}>
          <button onClick={function() {
            var allKeys = Object.keys(state.logs || {});
            var weekKeys = allKeys.filter(function(k) { return k.startsWith(week + "_"); });
            var filled = weekKeys.filter(function(k) { return state.logs[k]; });
            var total = [1,2,4,5].reduce(function(acc, d) {
              return acc + DAYS[block][d].exercises.reduce(function(a, e) { return a + e.sets; }, 0);
            }, 0);
            var tip = week < 5 ? "Add reps before adding weight." : week === 5 ? "Deload — recover for Block 2!" : week === 6 ? "Find working weights for new exercises." : week < 10 ? "Push hard, keep form tight." : "Done! Nice work.";
            alert("Week " + week + " — " + filled.length + "/" + total + " sets logged\n\n" + weekInfo.label + " · " + weekInfo.rpeNote + "\n\n" + tip);
          }} style={{ background: "none", border: "none", color: "#3d5c3d", cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 16 }}>📊</div>
            <div style={{ fontSize: 7, fontWeight: 700, marginTop: 1 }}>PROGRESS</div>
          </button>
          <button onClick={function() {
            if (confirm("Reset ALL data? This cannot be undone.")) {
              save({ week: 1, logs: {} });
            }
          }} style={{ background: "none", border: "none", color: "#252525", cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 16 }}>🔄</div>
            <div style={{ fontSize: 7, fontWeight: 700, marginTop: 1 }}>RESET</div>
          </button>
        </div>
      </div>
    </div>
  );
}
  </script>
</body>
</html>

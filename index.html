.header { padding:14px 16px 0; position:sticky; top:0; z-index:100; background:#0a0f0a; border-bottom:1px solid #1a2e1a; }
.header-top { display:flex; justify-content:space-between; align-items:flex-start; }
.logo { font-size:22px; font-weight:800; letter-spacing:-0.5px; color:#c8e6c9; }
.block-label { font-size:11px; color:#6b8f71; margin-top:1px; }
.week-badge { display:flex; align-items:center; gap:6px; }
.week-num { font-size:15px; font-weight:800; color:#c8e6c9; }
.type-pill { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:1px; }
.type-intro { background:#2d6a4f; color:#b7e4c7; }
.type-hard { background:#9d0208; color:#ffd6d6; }
.type-deload { background:#b8860b; color:#fff8dc; }
.rpe-note { font-size:10px; color:#6b8f71; margin-top:2px; }
.week-bar { display:flex; gap:3px; margin:10px 0 2px; }
.week-btn { flex:1; padding:6px 0; border:none; border-radius:4px; font-size:11px; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
.week-btn.active { background:#2d6a4f; color:#fff; font-weight:800; border-bottom-color:#4ade80; }
.week-btn.b1 { background:#1a2e1a; color:#6b8f71; font-weight:500; }
.week-btn.b2 { background:#1a1a2e; color:#6b8f71; font-weight:500; }
.alert-box { border-radius:6px; padding:6px 10px; font-size:11px; margin-top:6px; text-align:center; }
.alert-deload { background:#b8860b22; border:1px solid #b8860b44; color:#daa520; }
.alert-intro { background:#2d6a4f22; border:1px solid #2d6a4f44; color:#4ade80; }
.day-tabs { display:flex; gap:4px; margin:8px 0; padding-bottom:10px; }
.day-tab { flex:1; padding:8px 4px; border:none; border-radius:6px; cursor:pointer; transition:all 0.15s; }
.day-tab.active { background:#2d6a4f; color:#fff; }
.day-tab.inactive { background:#111a11; color:#6b8f71; }
.day-tab-label { font-size:11px; font-weight:700; letter-spacing:0.5px; }
.day-tab-sub { font-size:9px; opacity:0.8; margin-top:1px; }
.subtitle { font-size:13px; color:#6b8f71; margin-bottom:10px; font-style:italic; padding-left:4px; }
.ex-card { background:#111a11; border-radius:10px; margin-bottom:8px; border:1px solid #1a2e1a; overflow:hidden; transition:border-color 0.2s; }
.ex-card.open { border-color:#2d6a4f; }
.ex-header { width:100%; border:none; background:none; padding:12px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; text-align:left; }
.ex-num { font-size:11px; color:#4a6b4a; font-weight:700; margin-right:8px; }
.ex-name { font-size:14px; font-weight:600; color:#e8f0e0; }
.tier-badge { color:#fff; padding:1px 6px; border-radius:3px; font-size:9px; font-weight:700; margin-left:6px; }
.tier-sp { background:#e63946; }
.tier-s { background:#457b9d; }
.tier-a { background:#6c757d; }
.tier-other { background:#adb5bd; }
.log-dot { width:6px; height:6px; border-radius:3px; background:#4ade80; display:inline-block; margin-left:6px; }
.ex-summary { font-size:11px; color:#6b8f71; margin-top:3px; }
.prev-box { text-align:right; margin-right:4px; }
.prev-label { font-size:9px; color:#4a6b4a; }
.prev-val { font-size:14px; font-weight:700; color:#4ade80; }
.arrow { color:#4a6b4a; font-size:16px; transition:transform 0.2s; }
.arrow.open { transform:rotate(180deg); }
.ex-body { padding:0 14px 14px; border-top:1px solid #1a2e1a; }
.ex-notes { font-size:11px; color:#8faa8f; padding:8px 0 6px; line-height:1.4; }
.rpe-row { display:flex; gap:12px; margin-bottom:8px; font-size:11px; }
.rpe-row span { color:#6b8f71; }
.rpe-row b { color:#c8e6c9; }
.rpe-row b.fail { color:#e63946; }
.prev-week-box { background:#0a140a; border-radius:6px; padding:6px 10px; margin-bottom:8px; }
.prev-week-label { font-size:9px; color:#4a6b4a; font-weight:700; margin-bottom:4px; }
.prev-week-sets { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.prev-set-val { font-size:12px; color:#4ade80; font-weight:600; }
.prev-avg { font-size:12px; color:#6b8f71; margin-left:auto; }
.set-row { display:flex; gap:6px; }
.set-col { flex:1; }
.set-label { font-size:9px; color:#4a6b4a; text-align:center; margin-bottom:3px; font-weight:700; }
.set-input { width:100%; padding:10px 6px; border:2px solid #2d6a4f; border-radius:6px; background:#0a140a; color:#e8f0e0; font-size:16px; font-weight:700; text-align:center; outline:none; font-family:inherit; }
.set-input:focus { border-color:#4ade80; }
.set-input::placeholder { color:#2d4d2d; }
.subs-box { margin-top:10px; padding:8px 0 0; border-top:1px solid #1a2e1a; }
.subs-label { font-size:9px; color:#4a6b4a; font-weight:700; margin-bottom:4px; letter-spacing:0.5px; }
.subs-list { font-size:11px; color:#6b8f71; line-height:1.6; }
.subs-num { color:#457b9d; font-weight:700; }
.bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#0a0f0a; border-top:1px solid #1a2e1a; display:flex; justify-content:center; padding:10px 0 28px; max-width:430px; margin:0 auto; }
.bottom-bar-inner { display:flex; gap:32px; }
.bottom-btn { background:none; border:none; color:#4a6b4a; cursor:pointer; text-align:center; font-family:inherit; }
.bottom-btn-icon { font-size:20px; }
.bottom-btn-label { font-size:9px; font-weight:600; margin-top:2px; }
.bottom-btn.danger { color:#3a3a3a; }
</style>

<script>
const SK="cutkeep-v4";
const PROGRAM={block1:{name:"BLOCK 1: FOUNDATION",weeks:[{num:1,label:"Intro Week",type:"intro",rpeNote:"RPE 7-8 \u00b7 No failure"},{num:2,label:"Week 2",type:"hard",rpeNote:"RPE 8-9 \u00b7 Last set to failure"},{num:3,label:"Week 3",type:"hard",rpeNote:"RPE 8-9 \u00b7 Last set to failure"},{num:4,label:"Week 4",type:"hard",rpeNote:"RPE 8-9 \u00b7 Last set to failure"},{num:5,label:"Semi-Deload",type:"deload",rpeNote:"RPE 7 \u00b7 Drop 1 set per exercise"}]},block2:{name:"BLOCK 2: NOVELTY",weeks:[{num:6,label:"Intro/Ramp",type:"intro",rpeNote:"RPE 7-8 \u00b7 No failure"},{num:7,label:"Week 7",type:"hard",rpeNote:"RPE 8-9 \u00b7 Last set to failure"},{num:8,label:"Week 8",type:"hard",rpeNote:"RPE 8-9 \u00b7 Last set to failure"},{num:9,label:"Week 9",type:"hard",rpeNote:"RPE 8-9 \u00b7 Last set to failure"},{num:10,label:"Full Deload",type:"deload",rpeNote:"RPE 6-7 \u00b7 Drop 1-2 sets"}]}};
const DAYS={block1:{1:{name:"Upper 1",subtitle:"Chest/Delt Priority + Back",exercises:[{name:"Machine Chest Press",tier:"S+",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Smith Machine Bench",sub2:"DB Bench Press",notes:"S+ tier. 1s pause at bottom. Maintain pec tension."},{name:"Pec Deck",tier:"A",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Cable Crossover",sub2:"DB Fly",notes:"Max stretch setup. Pause 1s at stretch."},{name:"Cable Lateral Raise",tier:"S+",sets:3,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Myo-reps",rest:"1-2 min",sub1:"Machine Lat Raise",sub2:"Lean-In DB Lat Raise",notes:"S+ tier. Delt priority. Scapular plane, soft lockout."},{name:"Close-Grip Lat Pulldown",tier:"A",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Neutral-Grip Pulldown",sub2:"Wide-Grip Pulldown",notes:"Lean back ~15\u00b0, drive elbows down. Rhomboid-safe."},{name:"Neutral-Grip Cable Row",tier:"S",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Wide-Grip Cable Row",sub2:"Helms Row",notes:"S tier. Cable-based, smooth on rhomboids. Squeeze scapulae."},{name:"OH Cable Triceps Ext (Bar)",tier:"S+",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"OH Cable Ext (Rope)",sub2:"DB Skull Crusher",notes:"S+ tier. 1s pause in stretch. Long head emphasis."}]},2:{name:"Lower 1",subtitle:"Quad Priority",exercises:[{name:"Machine Squat",tier:"S",sets:3,reps:"6-8",earlyRpe:"~8-9",lastRpe:"Failure",rest:"3-4 min",sub1:"Smith Machine Squat",sub2:"Leg Press (feet high)",notes:"Quad dominant, no spinal load. Full depth."},{name:"Leg Extension",tier:"A",sets:3,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Reverse Nordic",sub2:"DB Step-Up",notes:"Jeff's fav. Seat back, 2-3s negative. Quad priority."},{name:"Lying Leg Curl",tier:"\u2014",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Seated Leg Curl",sub2:"Nordic Ham Curl",notes:"Max stretch at bottom. Prevent butt popping up."},{name:"Machine Hip Abduction",tier:"S",sets:2,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Cable Hip Abduction",sub2:"Lateral Band Walk",notes:"S tier. Lean forward ~30\u00b0 for glute stretch."},{name:"Standing Calf Raise",tier:"\u2014",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Stretch 30s",rest:"1-2 min",sub1:"Leg Press Calf",sub2:"Donkey Calf Raise",notes:"2s pause at bottom. Roll ankle on balls of feet."},{name:"Cable Crunch",tier:"\u2014",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Machine Crunch",sub2:"Decline Wtd Crunch",notes:"Round lower back as you crunch. MMC with abs."}]},4:{name:"Upper 2",subtitle:"Back/Delt Priority + Chest",exercises:[{name:"Neutral-Grip Pulldown",tier:"S",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Wide-Grip Pulldown",sub2:"Half-Kneel 1-Arm PD",notes:"S tier. Lats + mid-back. Rhomboid safe."},{name:"Wide-Grip Cable Row",tier:"S",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"2-3 min",sub1:"Neutral-Grip Cable Row",sub2:"Helms Row",notes:"S tier. Elbows flared ~45\u00b0, cable-based, smooth on back."},{name:"Machine Shoulder Press",tier:"A",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Seated DB OHP",sub2:"Cable Shoulder Press",notes:"Jeff's fav press. Delt priority \u2014 extra set."},{name:"Reverse Cable Crossover",tier:"S",sets:2,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Reverse Pec Deck",sub2:"Bent-Over Rev DB Fly",notes:"S tier. Jeff's rear delt fav. Largest semi-circle."},{name:"Incline DB Press",tier:"A",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Low Incline Machine",sub2:"Low Incline Smith",notes:"~15\u00b0 incline. Chest touch-up day."},{name:"Bayesian Cable Curl",tier:"S+",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Incline DB Curl",sub2:"Machine Preacher Curl",notes:"S+ tier. Strict torso, arms behind body, 2-3s neg."}]},5:{name:"Lower 2",subtitle:"Posterior Chain + Quad Top-Up",exercises:[{name:"Barbell RDL",tier:"A",sets:3,reps:"6-8",earlyRpe:"~8",lastRpe:"~9 (no fail)",rest:"2-3 min",sub1:"DB RDL",sub2:"45\u00b0 Back Extension",notes:"Jeff's ham fav. Moderate RPE \u2014 spinal load. 3/4 lockout."},{name:"Bulgarian Split Squat",tier:"S",sets:3,reps:"8-10/leg",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Walking DB Lunge",sub2:"Smith Machine Lunge",notes:"S tier. Quad priority + glute. Long step, slight lean."},{name:"Seated Leg Curl",tier:"\u2014",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Lying Leg Curl",sub2:"Nordic Ham Curl",notes:"Lean forward for max stretch."},{name:"Leg Extension",tier:"A",sets:2,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Myo-reps",rest:"1-2 min",sub1:"Reverse Nordic",sub2:"DB Step-Up",notes:"Quad top-up. High-effort finishing set."},{name:"Leg Press Calf Press",tier:"\u2014",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Stretch 30s",rest:"1-2 min",sub1:"Seated Calf Raise",sub2:"Donkey Calf Raise",notes:"2s pause at bottom."},{name:"Roman Chair Leg Raise",tier:"\u2014",sets:2,reps:"10-20",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Hanging Leg Raise",sub2:"Reverse Crunch",notes:"Round lower back as you curl up. RPE 9-10."}]}},block2:{1:{name:"Upper 1",subtitle:"Chest/Delt Priority + Back",exercises:[{name:"Barbell Incline Press",tier:"A",sets:3,reps:"6-8",earlyRpe:"~8-9",lastRpe:"Failure",rest:"3-4 min",sub1:"Incline DB Press",sub2:"Incline Smith Press",notes:"Free weight variation. ~30\u00b0 incline. 1s pause at chest."},{name:"Cable Crossover",tier:"A",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Pec Deck",sub2:"DB Fly",notes:"Different chest isolation from Block 1 Pec Deck."},{name:"Behind-Back Cuffed Lat Raise",tier:"S",sets:3,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Myo-reps",rest:"1-2 min",sub1:"Cable Y-Raise",sub2:"Lean-In DB Lat Raise",notes:"S tier. Delt priority. 'Y' sweep motion."},{name:"Wide-Grip Pulldown",tier:"S",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Neutral-Grip PD",sub2:"Wide-Grip Pull-Up",notes:"S tier. 1.5x shoulder width. 2-3s negative."},{name:"Seated Cable Row (V-handle)",tier:"S",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Wide-Grip Cable Row",sub2:"Helms Row",notes:"S tier. Different handle from Block 1 for novelty."},{name:"EZ-Bar Skullcrusher",tier:"S",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"DB Skullcrusher",sub2:"Katana Cable Ext",notes:"S tier. Arc behind head. Elbows slightly flared."}]},2:{name:"Lower 1",subtitle:"Quad Priority",exercises:[{name:"Smith Machine Squat",tier:"S",sets:3,reps:"6-8",earlyRpe:"~8-9",lastRpe:"Failure",rest:"3-4 min",sub1:"Machine Squat",sub2:"Leg Press (feet low)",notes:"S tier. Feet forward ~3-6in, lean into bar."},{name:"Leg Extension",tier:"A",sets:3,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Reverse Nordic",sub2:"DB Step-Up",notes:"Stays as quad priority staple. Seat back, 2-3s neg."},{name:"Seated Leg Curl",tier:"\u2014",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Lying Leg Curl",sub2:"Nordic Ham Curl",notes:"Lean forward for hamstring stretch."},{name:"Walking DB Lunge",tier:"S+",sets:2,reps:"10/leg",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Smith Machine Lunge",sub2:"DB Step-Up",notes:"S+ glute tier. Medium strides, minimize rear push-off."},{name:"Standing Calf Raise",tier:"\u2014",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Stretch 30s",rest:"1-2 min",sub1:"Leg Press Calf",sub2:"Donkey Calf Raise",notes:"2s pause at bottom."},{name:"Ab Wheel Rollout",tier:"\u2014",sets:2,reps:"8-12",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"LLPT Plank 30s",sub2:"Cable Crunch",notes:"Use abs, not just hip hinge. Progress ROM."}]},4:{name:"Upper 2",subtitle:"Back/Delt Priority + Chest",exercises:[{name:"Half-Kneel 1-Arm Lat PD",tier:"S",sets:3,reps:"8-10/arm",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Neutral-Grip PD",sub2:"Close-Grip Lat PD",notes:"S tier. Unilateral. Chest tall, elbow tucked."},{name:"Wide-Grip Cable Row",tier:"S",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Neutral-Grip Cable Row",sub2:"Helms Row",notes:"S tier. Cable-based, gentle on rhomboids."},{name:"Seated DB Shoulder Press",tier:"A",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Machine Shoulder Press",sub2:"Arnold Press",notes:"Free weight delt variation. Elbows break 90\u00b0."},{name:"Reverse Pec Deck",tier:"S",sets:2,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Rev Cable Crossover",sub2:"Bent-Over Rev DB Fly",notes:"S tier. Swing 'out' not 'back'."},{name:"Machine Chest Press",tier:"S+",sets:2,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Smith Bench Press",sub2:"DB Bench Press",notes:"S+ tier comes back as chest touch-up."},{name:"Machine Preacher Curl",tier:"S",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"EZ-Bar Cable Curl",sub2:"Incline DB Curl",notes:"S tier. Machine handles stabilization \u2014 just squeeze."}]},5:{name:"Lower 2",subtitle:"Posterior Chain + Quad Top-Up",exercises:[{name:"Dumbbell RDL",tier:"A",sets:3,reps:"8-10",earlyRpe:"~8",lastRpe:"~9 (no fail)",rest:"2-3 min",sub1:"Barbell RDL",sub2:"45\u00b0 Back Extension",notes:"Lighter spinal load. Same pattern. 3/4 lockout."},{name:"Leg Press (feet low)",tier:"A",sets:3,reps:"8-10",earlyRpe:"~8-9",lastRpe:"Failure",rest:"2-3 min",sub1:"Machine Squat",sub2:"Goblet Squat",notes:"Feet low for quad focus. Full depth, no back rounding."},{name:"Lying Leg Curl",tier:"\u2014",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Failure + LLPs",rest:"1-2 min",sub1:"Seated Leg Curl",sub2:"Nordic Ham Curl",notes:"Different hamstring curve from Block 1."},{name:"Leg Extension",tier:"A",sets:2,reps:"12-15",earlyRpe:"~8-9",lastRpe:"Myo-reps",rest:"1-2 min",sub1:"Reverse Nordic",sub2:"DB Step-Up",notes:"Quad top-up finisher."},{name:"Seated Calf Raise",tier:"\u2014",sets:2,reps:"10-12",earlyRpe:"~8-9",lastRpe:"Stretch 30s",rest:"1-2 min",sub1:"Leg Press Calf",sub2:"Standing Calf Raise",notes:"Soleus emphasis. 2s pause at bottom."},{name:"Roman Chair Leg Raise",tier:"\u2014",sets:2,reps:"10-20",earlyRpe:"~8-9",lastRpe:"Failure",rest:"1-2 min",sub1:"Hanging Leg Raise",sub2:"Reverse Crunch",notes:"Round lower back. RPE 9-10."}]}}};

let state={week:1,logs:{}};
let activeDay=1;
let openEx=null;

function getBlock(w){return w<=5?"block1":"block2";}
function getWeekInfo(w){return PROGRAM[getBlock(w)].weeks.find(function(x){return x.num===w;});}
function lk(w,d,e,s){return w+"_"+d+"_"+e+"_"+s;}
function gl(w,d,e,s){return(state.logs||{})[lk(w,d,e,s)]||"";}
function sl(w,d,e,s,v){state.logs[lk(w,d,e,s)]=v;saveQuiet();}
function pa(w,d,e){if(w<=1)return null;var pw=w-1;if(getBlock(pw)!==getBlock(w))return null;var vals=[];for(var i=0;i<4;i++){var v=(state.logs||{})[lk(pw,d,e,i)];if(v&&!isNaN(parseFloat(v)))vals.push(parseFloat(v));}if(!vals.length)return null;var sum=0;for(var j=0;j<vals.length;j++)sum+=vals[j];return Math.round(sum/vals.length*10)/10;}
function ps(w,d,e){if(w<=1||getBlock(w-1)!==getBlock(w))return[];var r=[];for(var i=0;i<4;i++)r.push((state.logs||{})[lk(w-1,d,e,i)]||"");return r;}
function loadState(){try{var s=localStorage.getItem(SK);if(s)state=JSON.parse(s);}catch(e){}}
function saveQuiet(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
function saveState(){saveQuiet();render();}
function tierClass(t){return t==="S+"?"tier-sp":t==="S"?"tier-s":t==="A"?"tier-a":"tier-other";}

function render(){
  var w=state.week||1,blk=getBlock(w),wi=getWeekInfo(w),dd=DAYS[blk][activeDay];
  var typeLabels={intro:"INTRO",hard:"PUSH",deload:"DELOAD"};
  var h='<div class="header"><div class="header-top"><div><div class="logo">CUT & KEEP</div><div class="block-label">'+PROGRAM[blk].name+'</div></div>';
  h+='<div style="text-align:right"><div class="week-badge"><span class="type-pill type-'+wi.type+'">'+typeLabels[wi.type]+'</span><span class="week-num">W'+w+'</span></div>';
  h+='<div class="rpe-note">'+wi.rpeNote+'</div></div></div>';
  h+='<div class="week-bar">';
  for(var n=1;n<=10;n++){var cls=n===w?"active":(n<=5?"b1":"b2");h+='<button class="week-btn '+cls+'" onclick="setWeek('+n+')">'+n+'</button>';}
  h+='</div>';
  if(w===5)h+='<div class="alert-box alert-deload">Semi-deload \u2014 drop 1 set per exercise, RPE 7, no failure</div>';
  if(w===6)h+='<div class="alert-box alert-intro">\u{1F504} Block 2 \u2014 new exercises, same priorities. Find your weights.</div>';
  if(w===10)h+='<div class="alert-box alert-deload">Full deload \u2014 RPE 6-7, drop 1-2 sets, recover fully</div>';
  h+='<div class="day-tabs">';
  var dks=[1,2,4,5],dlb={1:"MON",2:"TUE",4:"THU",5:"FRI"};
  for(var di=0;di<dks.length;di++){var dk=dks[di],dinf=DAYS[blk][dk],isA=dk===activeDay;h+='<button class="day-tab '+(isA?"active":"inactive")+'" onclick="setDay('+dk+')"><div class="day-tab-label">'+dlb[dk]+'</div><div class="day-tab-sub">'+dinf.name+'</div></button>';}
  h+='</div></div>';
  if(dd){h+='<div style="padding:8px 12px"><div class="subtitle">'+dd.subtitle+'</div>';
    for(var ei=0;ei<dd.exercises.length;ei++){var ex=dd.exercises[ei],isOpen=openEx===ei,pav=pa(w,activeDay,ei),pvs=ps(w,activeDay,ei);
      var hasPrev=false;for(var pi=0;pi<pvs.length;pi++)if(pvs[pi])hasPrev=true;
      var hasLogs=false;for(var si=0;si<ex.sets;si++)if(gl(w,activeDay,ei,si))hasLogs=true;
      h+='<div class="ex-card'+(isOpen?" open":"")+'"><button class="ex-header" onclick="toggleEx('+ei+')">';
      h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;flex-wrap:wrap">';
      h+='<span class="ex-num">'+(ei+1)+'</span><span class="ex-name">'+ex.name+'</span>';
      h+='<span class="tier-badge '+tierClass(ex.tier)+'">'+ex.tier+'</span>';
      if(hasLogs)h+='<span class="log-dot"></span>';
      h+='</div><div class="ex-summary">'+ex.sets+'\u00d7'+ex.reps+' \u00b7 '+ex.rest+' \u00b7 Last: '+ex.lastRpe+'</div></div>';
      h+='<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">';
      if(pav!==null)h+='<div class="prev-box"><div class="prev-label">PREV AVG</div><div class="prev-val">'+pav+'</div></div>';
      h+='<span class="arrow'+(isOpen?" open":"")+'">\u25BC</span></div></button>';
      if(isOpen){h+='<div class="ex-body"><div class="ex-notes">'+ex.notes+'</div>';
        h+='<div class="rpe-row"><span>Early: <b>'+ex.earlyRpe+'</b></span><span>Last: <b class="fail">'+ex.lastRpe+'</b></span><span>Rest: <b>'+ex.rest+'</b></span></div>';
        if(hasPrev){h+='<div class="prev-week-box"><div class="prev-week-label">LAST WEEK</div><div class="prev-week-sets">';
          for(var psi=0;psi<pvs.length;psi++)if(pvs[psi])h+='<span class="prev-set-val">S'+(psi+1)+': '+pvs[psi]+'</span>';
          if(pav!==null)h+='<span class="prev-avg">avg: '+pav+'</span>';h+='</div></div>';}
        h+='<div class="set-row">';
        for(var sj=0;sj<ex.sets;sj++){h+='<div class="set-col"><div class="set-label">SET '+(sj+1)+'</div><input class="set-input" type="text" inputmode="decimal" placeholder="\u2014" value="'+gl(w,activeDay,ei,sj)+'" oninput="logSet('+w+','+activeDay+','+ei+','+sj+',this.value)"></div>';}
        h+='</div><div class="subs-box"><div class="subs-label">IF EQUIPMENT IS BUSY</div>';
        h+='<div class="subs-list"><span class="subs-num">\u2460</span> '+ex.sub1+'<br><span class="subs-num">\u2461</span> '+ex.sub2+'</div></div></div>';}
      h+='</div>';}
    h+='</div>';}
  h+='<div class="bottom-bar"><div class="bottom-bar-inner">';
  h+='<button class="bottom-btn" onclick="showProgress()"><div class="bottom-btn-icon">\u{1F4CA}</div><div class="bottom-btn-label">PROGRESS</div></button>';
  h+='<button class="bottom-btn danger" onclick="resetAll()"><div class="bottom-btn-icon">\u{1F504}</div><div class="bottom-btn-label">RESET</div></button></div></div>';
  document.getElementById('app').innerHTML=h;
}
function setWeek(w){state.week=w;openEx=null;saveState();}
function setDay(d){activeDay=d;openEx=null;render();}
function toggleEx(i){openEx=(openEx===i)?null:i;render();}
function logSet(w,d,e,s,v){sl(w,d,e,s,v);}
function showProgress(){var w=state.week||1,blk=getBlock(w),wi=getWeekInfo(w);var ks=Object.keys(state.logs||{}),wk=ks.filter(function(k){return k.startsWith(w+"_");}),f=wk.filter(function(k){return state.logs[k];});var total=[1,2,4,5].reduce(function(a,d){return a+DAYS[blk][d].exercises.reduce(function(s,e){return s+e.sets;},0);},0);var tip=w<5?"Add reps before adding weight.":w===5?"Deload \u2014 recover for Block 2!":w===6?"Find working weights for new exercises.":w<10?"Push hard, keep form tight.":"Done! Nice work.";alert("Week "+w+" \u2014 "+f.length+"/"+total+" sets logged\n\n"+wi.label+" \u00b7 "+wi.rpeNote+"\n\n"+tip);}
function resetAll(){if(confirm("Reset ALL data? This cannot be undone.")){state={week:1,logs:{}};openEx=null;saveState();}}
loadState();var jd=new Date().getDay();activeDay={1:1,2:2,4:4,5:5}[jd]||1;render();
</script>
